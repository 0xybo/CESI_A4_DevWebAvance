apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
    name: transvirex-api
    namespace: production
spec:
    entryPoints:
        - web
    routes:
        - match: (Host(`transvirex.com`) || Host(`www.transvirex.com`)) && PathPrefix(`/api`)
          kind: Rule
          middlewares:
              - name: https-redirect
                namespace: production
          services:
              - name: transvirex-gateway
                namespace: production
                port: 3000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
    name: transvirex-api-secure
    namespace: production
spec:
    entryPoints:
        - websecure
    routes:
        - match: (Host(`transvirex.com`) || Host(`www.transvirex.com`)) && PathPrefix(`/api`)
          kind: Rule
          services:
              - name: transvirex-gateway
                namespace: production
                port: 3000
    tls:
        secretName: certs
