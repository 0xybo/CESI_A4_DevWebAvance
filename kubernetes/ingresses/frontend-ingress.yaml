apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
    name: transvirex-frontend
    namespace: production
spec:
    entryPoints:
        - web
    routes:
        - match: Host(`transvirex.com`) || Host(`www.transvirex.com`)
          kind: Rule
          middlewares:
              - name: https-redirect
                namespace: production
          services:
              - name: transvirex-frontend
                namespace: production
                port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
    name: transvirex-frontend-secure
    namespace: production
spec:
    entryPoints:
        - websecure
    routes:
        - match: Host(`transvirex.com`) || Host(`www.transvirex.com`)
          kind: Rule
          services:
              - name: transvirex-frontend
                namespace: production
                port: 80
    tls:
        secretName: certs
