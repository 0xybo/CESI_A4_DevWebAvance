apiVersion: apps/v1
kind: Deployment
metadata:
    name: rabbitmq
    namespace: production
    labels:
        app: rabbitmq
spec:
    replicas: 1
    selector:
        matchLabels:
            app: rabbitmq
    template:
        metadata:
            labels:
                app: rabbitmq
        spec:
            containers:
                - name: rabbitmq
                  image: rabbitmq:3.13-management-alpine
                  env:
                      - name: RABBITMQ_DEFAULT_USER
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_USER
                      - name: RABBITMQ_DEFAULT_PASS
                        valueFrom:
                            configMapKeyRef:
                                name: transvirex-config
                                key: RABBITMQ_PASSWORD
                  ports:
                      - containerPort: 5672
                        name: amqp
                      - containerPort: 15672
                        name: management
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
    name: rabbitmq
    namespace: production
    labels:
        app: rabbitmq
spec:
    type: ClusterIP
    selector:
        app: rabbitmq
    ports:
        - port: 5672
          targetPort: 5672
          name: amqp
          protocol: TCP
