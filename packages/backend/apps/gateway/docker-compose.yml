services:
    gateway-service:
        build:
            # Context set to the root of the backend monorepo
            context: ../../
            dockerfile: ./apps/gateway/Dockerfile
            target: development
        container_name: transvirex-gateway-service
        environment:
            - NODE_ENV=${NODE_ENV:-development}
            - LOG_LEVEL=${LOG_LEVEL:-info}
            - DEBUG=${DEBUG:-*}
            - API_HOST=${API_HOST:-gateway-service}
            - API_PORT=${API_PORT:-3000}
            - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
            - POSTGRES_PORT=${POSTGRES_PORT:-5432}
            - POSTGRES_USER=${POSTGRES_USER:-postgres_user}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_password}
            - POSTGRES_DB=${POSTGRES_DB:-transvirex}
            - RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
            - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
            - RABBITMQ_USER=${RABBITMQ_USER:-rabbitmq_user}
            - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-rabbitmq_password}
            - AUTH_SERVICE_URL=http://authentication-service:3001
            - BILLING_SERVICE_URL=http://billing-service:3002
            - DELIVERY_SERVICE_URL=http://delivery-service:3003
            - STOCK_SERVICE_URL=http://stock-service:3004
            - USERS_SERVICE_URL=http://users-service:3005
        volumes:
            - ./:/app/apps/gateway
            - /app/node_modules
            - /app/dist
        depends_on:
            - postgres
            - rabbitmq
        restart: unless-stopped
        networks:
            - transvirex-network
        develop:
            watch:
                - path: ./
                  ignore:
                      - node_modules
                      - dist
                  action: sync
                  target: /app/apps/gateway
